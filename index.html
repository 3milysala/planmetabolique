<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCLF Bulk · 73→80kg</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root[data-theme="light"]{--bg:#f6f0e5;--bg2:#fffaf1;--bg3:#efe4d1;--border:#e0d1bd;--ba:#c87645;--text:#2c2118;--text2:#75695d;--text3:#aa9a89;--accent:#b8663b;--accent2:#d99a57;--green:#52795a;--blue:#477482;--red:#ad5b4f;--brown:#9a6842;--note:#fbf1e3;--tag:rgba(184,102,59,.1);--open:#fff5e7;--shadow:0 12px 34px rgba(78,52,32,.08);--page-gradient:radial-gradient(circle at 12% 4%,rgba(216,154,96,.28),transparent 28%),radial-gradient(circle at 88% 12%,rgba(255,218,154,.32),transparent 30%),radial-gradient(circle at 50% 92%,rgba(116,148,124,.14),transparent 38%),linear-gradient(160deg,#fbf4e8 0%,#f4ead9 42%,#efe0cb 100%);}
:root[data-theme="dark"]{--bg:#15120e;--bg2:#1f1a14;--bg3:#2b241b;--border:#3a3025;--ba:#d89b60;--text:#f0e6d8;--text2:#b3a695;--text3:#706458;--accent:#d49a5c;--accent2:#efc37e;--green:#88b071;--blue:#7faeb7;--red:#d07a6e;--brown:#c18a59;--note:#241d16;--tag:rgba(212,154,92,.13);--open:#251f18;--shadow:0 16px 38px rgba(0,0,0,.24);--page-gradient:radial-gradient(circle at 15% 0%,rgba(216,154,96,.16),transparent 30%),radial-gradient(circle at 86% 16%,rgba(127,86,44,.18),transparent 34%),linear-gradient(180deg,var(--bg),var(--bg));}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--page-gradient);background-attachment:fixed;color:var(--text);font-family:'Work Sans',sans-serif;min-height:100vh;transition:background .3s,color .3s;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
.wrap{max-width:480px;margin:0 auto;padding:0 18px 84px;}

/* header */
.header{padding:34px 0 22px;display:flex;justify-content:space-between;align-items:flex-start;}
.eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:6px;}
.title{font-family:'Fraunces',serif;font-size:36px;font-weight:700;letter-spacing:-.8px;line-height:.95;}
.subtitle{color:var(--text2);font-size:12px;font-weight:400;margin-top:8px;}
.theme-btn{background:var(--bg2);border:1px solid var(--border);border-radius:50%;width:38px;height:38px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;margin-top:1px;box-shadow:var(--shadow);}
.theme-btn:hover{border-color:var(--accent);transform:translateY(-1px);}

/* nav */
.nav{display:flex;background:rgba(255,250,241,.72);border:1px solid var(--border);border-radius:18px;padding:4px;margin-bottom:20px;gap:4px;box-shadow:var(--shadow);backdrop-filter:blur(12px);}
:root[data-theme="dark"] .nav{background:rgba(31,26,20,.78);}
.nav-btn{flex:1;padding:10px 5px;border-radius:14px;border:none;cursor:pointer;font-family:'Work Sans',sans-serif;font-weight:600;font-size:12px;background:transparent;color:var(--text2);transition:all .2s;white-space:nowrap;}
.nav-btn.active{background:var(--text);color:var(--bg2);}

/* view */
.view{display:none;}.view.active{display:block;}

/* day toggle */
.day-toggle{display:flex;gap:10px;margin-bottom:16px;}
.day-btn{flex:1;padding:10px;border-radius:14px;border:1px solid var(--border);cursor:pointer;font-family:'Work Sans',sans-serif;font-weight:600;font-size:12px;background:rgba(255,250,241,.45);color:var(--text2);transition:all .2s;}
:root[data-theme="dark"] .day-btn{background:rgba(31,26,20,.45);}
.day-btn.active{border-color:var(--accent);color:var(--accent);background:var(--tag);}

/* card */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;margin-bottom:9px;overflow:hidden;cursor:pointer;transition:all .2s;box-shadow:0 1px 0 rgba(255,255,255,.35) inset;}
.card:hover{border-color:rgba(184,102,59,.38);transform:translateY(-1px);}
.card.open{border-color:var(--ba);background:var(--open);box-shadow:var(--shadow);}
.card-header{display:flex;justify-content:space-between;align-items:center;padding:14px 15px;}
.card-left{display:flex;align-items:center;gap:10px;min-width:0;}
.card-emoji{font-size:15px;filter:saturate(.85);}
.card-name{font-weight:600;font-size:13px;letter-spacing:-.1px;}
.card-right{display:flex;align-items:center;gap:9px;}
.card-kcal{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:var(--accent);}
.chev{color:var(--text3);font-size:9px;transition:transform .2s;}
.card.open .chev{transform:rotate(180deg);}
.card-body{display:none;padding:0 15px 14px;}
.card.open .card-body{display:block;}

/* items */
.item-list{list-style:none;margin-bottom:12px;}
.item-list li{display:flex;align-items:flex-start;gap:8px;padding:4px 0;font-size:12.5px;color:var(--text2);line-height:1.5;}
.item-list li::before{content:"";width:4px;height:4px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:8px;opacity:.75;}

/* badges */
.macros{display:flex;gap:6px;flex-wrap:wrap;}
.badge{padding:4px 8px;border-radius:999px;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;border:1px solid transparent;}
.bc{background:rgba(71,116,130,.12);color:var(--blue);border-color:rgba(71,116,130,.18);}.bp{background:rgba(82,121,90,.12);color:var(--green);border-color:rgba(82,121,90,.18);}.bf{background:rgba(154,104,66,.12);color:var(--brown);border-color:rgba(154,104,66,.18);}

.note{margin-top:10px;padding:9px 11px;background:var(--note);border:1px solid rgba(184,102,59,.12);border-left:3px solid var(--accent);border-radius:10px;font-size:11.5px;color:var(--text2);font-style:normal;line-height:1.6;}

/* total */
.total{background:linear-gradient(180deg,var(--bg2),var(--open));border:1px solid var(--ba);border-radius:20px;padding:17px 17px;margin-top:13px;box-shadow:var(--shadow);}
.total-lbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:var(--accent);margin-bottom:9px;}
.total-num{font-family:'Fraunces',serif;font-size:34px;font-weight:700;letter-spacing:-1px;line-height:1;margin-bottom:12px;}
.total-num span{font-size:13px;color:var(--text2);font-family:'Work Sans',sans-serif;font-weight:400;}
.prog{height:5px;background:var(--bg3);border-radius:999px;margin-bottom:12px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px;transition:width .4s;}

/* workouts */
.day-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dt{background:var(--green);box-shadow:0 0 8px rgba(82,121,90,.55),0 0 18px rgba(82,121,90,.22);}
.dm{background:var(--blue);box-shadow:0 0 8px rgba(71,116,130,.55),0 0 18px rgba(71,116,130,.22);}
.dr{background:var(--text3);box-shadow:0 0 7px rgba(170,154,137,.32);}
.drf{background:var(--accent);box-shadow:0 0 8px rgba(184,102,59,.55),0 0 18px rgba(184,102,59,.24);}
.day-name{font-family:'Fraunces',serif;font-size:16px;font-weight:700;letter-spacing:-.2px;}
.tbadge{font-family:'DM Mono',monospace;font-size:9px;padding:3px 7px;border-radius:20px;}
.tbt{background:rgba(82,121,90,.12);color:var(--green);}
.tbm{background:rgba(71,116,130,.12);color:var(--blue);}
.tbr{background:rgba(112,100,88,.12);color:var(--text3);}
.tbrf{background:var(--tag);color:var(--accent);}
.split-lbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
.ex-list{list-style:none;}
.ex-list li{padding:7px 0;border-bottom:1px solid var(--border);}
.ex-list li:last-child{border-bottom:none;}
.ex-row{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.ex-name{color:var(--text);font-weight:600;font-size:12.5px;}
.ex-sets{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);background:var(--bg3);padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0;}
.ex-tip{font-size:11px;color:var(--text3);font-style:normal;margin-top:4px;line-height:1.45;}
.rest-txt{font-size:12.5px;color:var(--text2);line-height:1.7;}
.rest-txt strong{color:var(--text);}
.nut-tag{display:inline-flex;align-items:center;gap:4px;margin-top:10px;font-family:'DM Mono',monospace;font-size:9px;padding:3px 8px;border-radius:20px;border:1px solid var(--border);color:var(--text3);}
.failure-note{margin-top:10px;padding:9px 11px;background:rgba(82,121,90,.1);border-left:3px solid var(--green);border-radius:10px;font-size:11.5px;color:var(--green);line-height:1.6;}
.pectus{margin-top:10px;padding:9px 11px;background:rgba(173,91,79,.1);border-left:3px solid var(--red);border-radius:10px;font-size:11.5px;color:var(--red);line-height:1.6;}
.pectus strong{color:var(--red);}

/* ── PRINCIPES ── */
.principes-menu{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px;}
.pmenu-btn{padding:7px 12px;border-radius:20px;border:1px solid var(--border);background:rgba(255,250,241,.45);color:var(--text2);font-family:'Work Sans',sans-serif;font-size:11.5px;font-weight:600;cursor:pointer;transition:all .2s;}
:root[data-theme="dark"] .pmenu-btn{background:rgba(31,26,20,.45);}
.pmenu-btn.active{border-color:var(--accent);color:var(--accent);background:var(--tag);}
.principe-section{display:none;}.principe-section.active{display:block;}

.p-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:15px;margin-bottom:9px;box-shadow:0 1px 0 rgba(255,255,255,.28) inset;}
.p-card-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--accent);margin-bottom:9px;}
.p-card p{font-size:12.5px;color:var(--text2);line-height:1.75;margin-bottom:7px;}
.p-card p:last-child{margin-bottom:0;}
.p-card strong{color:var(--text);}
.p-rule{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12.5px;color:var(--text2);line-height:1.55;}
.p-rule:last-child{border-bottom:none;}
.p-rule-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:5px;}
.p-rule strong{color:var(--text);}

.fde-block{background:var(--bg2);border:1px solid var(--border);border-radius:16px;margin-bottom:8px;overflow:hidden;}
.fde-header{display:flex;justify-content:space-between;align-items:center;padding:13px 15px;cursor:pointer;}
.fde-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);font-weight:500;}
.fde-name{font-size:12.5px;font-weight:600;color:var(--text);}
.fde-body{display:none;padding:0 15px 13px;font-size:12.5px;color:var(--text2);line-height:1.75;}
.fde-block.open{border-color:var(--ba);}
.fde-block.open .fde-body{display:block;}
.fde-block.open .chev{transform:rotate(180deg);}

.suivi-step{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:14px 15px;margin-bottom:8px;}
.suivi-num{font-family:'Fraunces',serif;font-size:24px;font-weight:700;color:var(--accent);line-height:1;margin-bottom:5px;}
.suivi-title{font-weight:700;font-size:13.5px;margin-bottom:7px;}
.suivi-body{font-size:12px;color:var(--text2);line-height:1.75;}
.suivi-body strong{color:var(--text);}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.card,.fde-block,.p-card,.suivi-step{animation:fadeUp .3s ease both;}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div>
      <div class="eyebrow">Plan · 73kg → 80kg</div>
      <div class="title">HCLF BULK</div>
      <div class="subtitle">Push/Pull · 1 série failure · HCLF bulk</div>
    </div>
    <button class="theme-btn" onclick="toggleTheme()">🌙</button>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="switchView('meals',this)">🍽 Repas</button>
    <button class="nav-btn" onclick="switchView('workouts',this)">🏋️ Training</button>
    <button class="nav-btn" onclick="switchView('principes',this)">📖 Principes</button>
  </div>

  <!-- ═══ MEALS ═══ -->
  <div id="view-meals" class="view active">
    <div class="day-toggle">
      <button class="day-btn active" id="btn-training" onclick="switchDay('training')">🏋️ Entraînement</button>
      <button class="day-btn" id="btn-rest" onclick="switchDay('rest')">😴 Repos</button>
    </div>
    <div id="meals-list"></div>
    <div id="total-block"></div>
  </div>

  <!-- ═══ WORKOUTS ═══ -->
  <div id="view-workouts" class="view">
    <div id="workouts-list"></div>
  </div>

  <!-- ═══ PRINCIPES ═══ -->
  <div id="view-principes" class="view">
    <div class="principes-menu" id="pmenu"></div>
    <div id="principes-content"></div>
  </div>

</div>

<script>
// ─── MEALS DATA ──────────────────────────────────────────────────────────────
const meals={
  training:[
    {emoji:"☕",title:"Matin (réveil)",
     items:["350ml lait écrémé + café + 25g sucre ou miel","1 verre de jus d'orange (250ml) + pincée de sel","Option parfois : morceau de baguette + marmelade/confiture de fraise ou 1 banane"],
     m:{c:75,p:12,f:2,k:366},
     note:"Démarre l'intake tôt sans créer de satiété. OJ gardé au matin + intra pour contrôler le budget."},
    {emoji:"🍚",title:"Repas 1 (~10h)",

     note:"Simple et répétable. Si le repas semble lourd, réduire la protéine avant les glucides."},
    {emoji:"🍫",title:"Bloc entre les repas (~12h)",
     items:["650ml lait chocolaté écrémé","100g dattes ou raisins secs","5–10g gingembre confit si la nourriture stagne"],

     note:"C'est ici que l'essentiel de l'intake se construit. Boire rapidement, pas à petites gorgées."},
    {emoji:"🍚",title:"Repas 2 (~14h)",
     items:["111g riz blanc cru, pâtes blanches ou 550–650g pommes de terre","70–90g protéine maigre","150ml jus de pomme + sel"],
     m:{c:112,p:18,f:3,k:547},
     note:"Le petit jus de pomme cale des glucides liquides sans ajouter d'OJ."},
    {emoji:"⚡",title:"Pré-Workout (~60 min avant)",
     items:["250ml jus de pomme ou petit cola","30g rice cakes ou céréales low-fat","Pas de gras"],
     m:{c:55,p:3,f:1,k:241},
     note:"Léger. Pas de gras, pas de gros repas avant l'entraînement."},
    {emoji:"🏋️",title:"Intra-Workout",

     m:{c:60,p:16,f:3,k:331},
     note:"Post-workout liquide, zéro OJ en plus. Le prochain repas ne doit pas être retardé."},
    {emoji:"🍽️",title:"Dîner",
     items:["100g riz, pain au levain, pâtes blanches ou pommes de terre","80–100g protéine maigre (poisson blanc, thon, blanc d'œuf, steak haché 5% MG parfois)","Salade daily : 1–2 carottes râpées en strips + 1 c. à café huile de coco + 1/2 c. à café vinaigre blanc + sel de Guérande"],
     m:{c:95,p:20,f:10,k:550},
     note:null},
    {emoji:"🌙",title:"Fin de soirée",
     items:["Sorbet (180–220g) si dispo","Sinon yaourt grec 0% ou skyr + beaucoup de miel","300ml lait écrémé ou cola"],
     m:{c:90,p:10,f:4,k:436},
     note:"Sorbet = glucides denses. Si pas de sorbet : skyr/yaourt grec 0% + miel pour garder le snack low-fat et digeste. Pas d'OJ ici."}
  ],
  rest:[
    {emoji:"☕",title:"Matin (réveil)",
     items:["350ml lait écrémé + café + 25g sucre ou miel","500ml jus d'orange maximum + pincée de sel","Option parfois : morceau de baguette + marmelade/confiture de fraise ou 1 banane"],
     m:{c:90,p:12,f:2,k:426},
     note:"Tout l'OJ du jour est ici. Ne pas dépasser 500ml les jours de repos."},
    {emoji:"🍚",title:"Repas 1 (~10h)",
     items:["111g riz blanc cru ou 550–650g pommes de terre","70–90g protéine maigre (thon, blanc d'œuf, poisson blanc, steak haché 5% MG parfois)","Sel"],
     m:{c:92,p:18,f:3,k:467},
     note:null},
    {emoji:"🍫",title:"Bloc entre les repas (~12h)",
     items:["650ml lait chocolaté écrémé","100g dattes ou raisins secs","5–10g gingembre confit si la nourriture stagne"],
     m:{c:145,p:20,f:4,k:696},
     note:"Compense l'absence d'intra-workout sans augmenter les gros repas solides."},
    {emoji:"🍚",title:"Repas 2 (~14h)",
     items:["111g riz blanc cru, pâtes blanches ou 550–650g pommes de terre","70–90g protéine maigre","250ml jus de pomme + sel"],
     m:{c:112,p:18,f:3,k:547},
     note:"Jus de pomme à la place de l'OJ pour garder les glucides hauts sans exploser le budget."},
    {emoji:"🍏",title:"Bloc léger (~17h)",
     items:["300ml jus de pomme ou cola","30–40g rice cakes ou céréales low-fat","Pas de gras"],
     m:{c:70,p:3,f:1,k:301},
     note:"Remplace une partie des glucides intra manquants des jours off."},
    {emoji:"🍽️",title:"Dîner",
     items:["100g riz, pain au levain, pâtes blanches ou pommes de terre","80–100g protéine maigre (poisson blanc, thon, blanc d'œuf, steak haché 5% MG parfois)","Salade daily : 1–2 carottes râpées en strips + 1 c. à café huile de coco + 1/2 c. à café vinaigre blanc + sel de Guérande"],
     m:{c:95,p:20,f:10,k:550},
     note:null},
    {emoji:"🌙",title:"Fin de soirée",
     items:["Sorbet (180–220g) si dispo","Sinon yaourt grec 0% ou skyr + beaucoup de miel","300ml lait écrémé ou cola"],
     m:{c:90,p:10,f:5,k:445},
     note:"Glucides avant sommeil, zéro OJ supplémentaire. Skyr/yaourt grec 0% + miel si pas de sorbet. Total OJ repos = 500ml max."}
  ]
};

// ─── WORKOUTS DATA ────────────────────────────────────────────────────────────
const workouts=[
  {day:"Lundi",type:"t",label:"Upper Push",split:"UPPER PUSH",pectus:true,
   pectusNote:"Déprioritiser les delts. Travailler le pec surtout en position contractée (pec deck). Éviter l'étirement profond pour l'instant. Après quelques semaines, ajouter un seul exercice en stretch si le pec reste dominant.",
   failureNote:"1 série principale à la failure par exercice. Après la dernière rep complète : partials dans la portion forte + rest-pause si besoin. La qualité d'exécution prime sur la quantité.",

    {name:"Decline Chest Press",sets:"1×F · 6→10",tip:"Réduit la dominance des épaules — plus d'implication pectorale"},

    {name:"Incline Dumbbell Front Raise",sets:"1×F · 10",tip:null},
    {name:"Machine Lateral Raise",sets:"1×F · 10",tip:"Tension constante sur tout le mouvement"},
    {name:"Machine Preacher Curl",sets:"1×F · 6→10",tip:null},
    {name:"Cable Reverse Curl",sets:"1×F · 10",tip:null}
   ],nut:"High carb · ~3 800 kcal"},
  {day:"Mardi",type:"m",label:"Repos actif",
   rest:"<strong>Marche 30–60 min.</strong> Récupération SNC, tendons, articulations. Ce jour rend le Mercredi productif.",
   nut:"Moderate · ~3 200 kcal"},
  {day:"Mercredi",type:"t",label:"Lower Push",split:"LOWER PUSH",
   failureNote:"1 série à la failure. Extensions d'abord (position contractée), leg press ensuite (position étirée) — ordre intentionnel.",
   exos:[
    {name:"Machine Leg Extension",sets:"1×F · 10",tip:"Position contractée — quadriceps"},
    {name:"Single-Leg Leg Press",sets:"1×F · 6→10",tip:"Position étirée — complémentaire aux extensions"},
    {name:"Machine Adductor",sets:"1×F · 10",tip:null}
   ],nut:"High carb · ~3 800 kcal"},
  {day:"Jeudi",type:"r",label:"Repos",
   rest:"<strong>Repos complet.</strong> Journée basse en glucides — fenêtre d'oxydation lipidique.",
   nut:"Lower · ~2 800 kcal"},
  {day:"Vendredi",type:"t",label:"Upper Pull",split:"UPPER PULL",

  document.getElementById('meals-list').innerHTML=list.map((meal,i)=>{
    const op=openM.has(day+i);
    return `<div class="card${op?' open':''}" onclick="tM(${i})" style="animation-delay:${i*.04}s">
      <div class="card-header">
        <div class="card-left"><span class="card-emoji">${meal.emoji}</span><span class="card-name">${meal.title}</span></div>
        <div class="card-right"><span class="card-kcal">${meal.m.k} kcal</span><span class="chev">▼</span></div>
      </div>
      <div class="card-body">
        <ul class="item-list">${meal.items.map(x=>`<li>${x}</li>`).join('')}</ul>
        <div class="macros"><span class="badge bc">Carbs ${meal.m.c}g</span><span class="badge bp">Prot ${meal.m.p}g</span><span class="badge bf">Fat ${meal.m.f}g</span></div>
        ${meal.note?`<div class="note">${meal.note}</div>`:''}
      </div>
    </div>`;
  }).join('');
  document.getElementById('total-block').innerHTML=`
    <div class="total">
      <div class="total-lbl">Total journalier</div>
      <div class="total-num">${tot.k.toLocaleString('fr-FR')} <span>kcal</span></div>
      <div class="prog"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div class="macros"><span class="badge bc">Carbs ${tot.c}g</span><span class="badge bp">Prot ${tot.p}g</span><span class="badge bf">Fat ${tot.f}g</span></div>
    </div>`;
}

// ─── RENDER WORKOUTS ──────────────────────────────────────────────────────────
function renderWorkouts(){
  const dm={t:'dt',m:'dm',r:'dr',rf:'drf'};
  const bm={t:'tbt',m:'tbm',r:'tbr',rf:'tbrf'};
  document.getElementById('workouts-list').innerHTML=workouts.map((w,i)=>{
    const op=openW.has(i);
    let body='';
    if(w.exos){
      body=`<div class="split-lbl">${w.split}</div>
        <div class="failure-note">💀 ${w.failureNote}</div>
        <ul class="ex-list" style="margin-top:10px">${w.exos.map(e=>`<li>
          <div class="ex-row"><span class="ex-name">${e.name}</span><span class="ex-sets">${e.sets}</span></div>
          ${e.tip?`<div class="ex-tip">${e.tip}</div>`:''}
        </li>`).join('')}</ul>`;
      if(w.pectus) body+=`<div class="pectus" style="margin-top:10px"><strong>⚠ Pectus excavatum</strong> — ${w.pectusNote}</div>`;
    } else {
      body=`<p class="rest-txt">${w.rest}</p>`;
    }
    body+=`<div class="nut-tag">🥗 ${w.nut}</div>`;
    return `<div class="card${op?' open':''}" onclick="tW(${i})" style="animation-delay:${i*.04}s">
      <div class="card-header">
        <div class="card-left"><div class="day-dot ${dm[w.type]}"></div><span class="day-name">${w.day}</span></div>
        <div class="card-right"><span class="tbadge ${bm[w.type]}">${w.label}</span><span class="chev">▼</span></div>
      </div>
      <div class="card-body">${body}</div>
    </div>`;
  }).join('');
}

// ─── RENDER PRINCIPES ─────────────────────────────────────────────────────────
function renderPrincipes(){
  document.getElementById('pmenu').innerHTML=principes.map(p=>`
    <button class="pmenu-btn${p.id===currentP?' active':''}" onclick="switchP('${p.id}')">${p.label}</button>
  `).join('');
  const sec=principes.find(p=>p.id===currentP);
  document.getElementById('principes-content').innerHTML=sec?sec.content:'';
}

function switchP(id){currentP=id;renderPrincipes();}

// ─── INTERACTIONS ─────────────────────────────────────────────────────────────
function tM(i){const k=day+i;openM.has(k)?openM.delete(k):openM.add(k);renderMeals();}
function tW(i){openW.has(i)?openW.delete(i):openW.add(i);renderWorkouts();}
function switchDay(d){day=d;document.getElementById('btn-training').classList.toggle('active',d==='training');document.getElementById('btn-rest').classList.toggle('active',d==='rest');renderMeals();}
function switchView(v,btn){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  btn.classList.add('active');
  if(v==='principes') renderPrincipes();
}
function toggleTheme(){const h=document.documentElement;const dark=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',dark?'light':'dark');document.querySelector('.theme-btn').textContent=dark?'🌙':'☀️';}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderMeals();
renderWorkouts();
</script>
<script data-pplx-inline-edit>
(function () {
  if (window === window.top) return;

  const allowedParentOrigins = ["https://www.perplexity.ai","https://perplexity.ai","https://testing.perplexity.ai","https://staging.perplexity.ai","https://*.preview.i.perplexity.ai","http://localhost:3000","http://127.0.0.1:3000","http://localhost:5173","http://127.0.0.1:5173"];
  const MAX_FONT_BYTES = 500 * 1024;
  const MAX_TOTAL_FONT_BYTES = 2 * 1024 * 1024;
  let scrollForwarding = false;
  let scrollRaf = 0;
  let trustedTopOrigin = null;

  // Allow entries like "https://*.preview.i.perplexity.ai" — the wildcard
  // matches a single DNS label (no dots), so "https://*.foo" cannot stretch
  // across multiple labels.
  function matchesAllowedOrigin(origin) {
    if (!origin) return false;
    for (const entry of allowedParentOrigins) {
      if (!entry.includes("*")) {
        if (entry === origin) return true;
        continue;
      }
      const pattern = new RegExp(
        "^" +
          entry.replace(/[.+?^${}()|[\]\\]/g, "\\$&").replace(/\*/g, "[^.]+") +
          "$",
      );
      if (pattern.test(origin)) return true;
    }
    return false;
  }

  // Trust decision: when the sender is same-origin-visible (event.origin is a
  // real origin like https://www.perplexity.ai) we trust event.origin directly.
  // When event.origin is "null" (opaque broker srcdoc), we fall back to the
  // broker's stamped `parentOrigin` to identify the top window. The fallback
  // is claim-only — we rely on the browser's native `targetOrigin` enforcement
  // on the response path (see postToTrustedTop) to ensure replies can't be
  // delivered to anyone but the actual top window of that claimed origin.
  function getTrustedParentOrigin(event) {
    const forwardedParentOrigin =
      typeof event.data.parentOrigin === "string" ? event.data.parentOrigin : null;
    const parentOrigin = event.origin === "null" ? forwardedParentOrigin : event.origin;
    return matchesAllowedOrigin(parentOrigin) ? parentOrigin : null;
  }

  // All responses go to window.top with targetOrigin = the allowlisted origin.
  // An attacker that iframes us inside their own null-origin broker can claim
  // any parentOrigin they like, but the browser will drop the reply whenever
  // the real top's origin doesn't match — so the screenshot never leaves.
  function postToTrustedTop(message) {
    if (!trustedTopOrigin) return;
    try {
      window.top.postMessage(message, trustedTopOrigin);
    } catch (_error) {}
  }

  function inlineAll(original, clone) {
    if (original.nodeType !== 1 || clone.nodeType !== 1) return;

    try {
      const computedStyle = getComputedStyle(original);
      // cssText on a computed style is the serialized declaration in modern
      // Chromium/Safari — a single read beats enumerating ~400 longhand
      // properties. Firefox returns "" here, so we fall back on empty.
      const serialized = computedStyle.cssText;
      if (serialized) {
        clone.style.cssText = serialized;
      } else {
        const parts = new Array(computedStyle.length);
        for (let index = 0; index < computedStyle.length; index += 1) {
          const property = computedStyle[index];
          parts[index] = `${property}:${computedStyle.getPropertyValue(property)};`;
        }
        clone.style.cssText = parts.join("");
      }
    } catch (_error) {}

    const originalChildren = original.children;
    const clonedChildren = clone.children;
    for (
      let index = 0;
      index < originalChildren.length && index < clonedChildren.length;
      index += 1
    ) {
      inlineAll(originalChildren[index], clonedChildren[index]);
    }

  function extractFontUrl(srcValue) {
    const matches = [
      ...srcValue.matchAll(
        /url\(["']?([^"')]+)["']?\)(?:\s*format\(["']?([^"')]+)["']?\))?/gi,
      ),
    ];
    if (matches.length === 0) return null;
    const woff2 = matches.find((m) => m[2] && m[2].toLowerCase().includes("woff2"));
    if (woff2) return woff2[1];
    const woff = matches.find((m) => m[2] && m[2].toLowerCase().includes("woff"));
    if (woff) return woff[1];
    return matches[0][1];

  // Cache resolved font URL -> data URI across captures. Fonts on a page
  // essentially never change, and a batch run emits multiple captures back to
  // back — without this we'd refetch + re-base64 every time.
  const fontDataUriCache = new Map();
  const SRC_DECLARATION_RE = /src\s*:\s*[^;}]+/i;

  async function fetchAsDataUri(url) {
    if (fontDataUriCache.has(url)) return fontDataUriCache.get(url);
    let dataUri = null;
    try {
      const response = await fetch(url, { mode: "cors", credentials: "omit" });
      if (response.ok) {
        const blob = await response.blob();
        if (blob.size <= MAX_FONT_BYTES) {
          dataUri = await new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = () =>
              resolve(typeof reader.result === "string" ? reader.result : null);
            reader.onerror = () => resolve(null);
            reader.readAsDataURL(blob);
          });

      }
    } catch (_error) {
      dataUri = null;
    }
    fontDataUriCache.set(url, dataUri);
    return dataUri;
  }

  function collectFontFaceRuleTexts() {
    const rules = [];
    for (const sheet of document.styleSheets) {
      let cssRules;
      try {
        cssRules = sheet.cssRules;
      } catch (_error) {
        continue;
      }
      if (!cssRules) continue;
      for (const rule of cssRules) {
        const cssText = rule.cssText || "";
        if (cssText.startsWith("@font-face")) rules.push(cssText);
      }

    return rules;
  }

  async function buildInlinedFontCss() {
    const ruleTexts = collectFontFaceRuleTexts();
    if (ruleTexts.length === 0) return null;

    const resolved = ruleTexts.map((cssText) => {
      if (!SRC_DECLARATION_RE.test(cssText)) return null;
      const srcMatch = cssText.match(/src\s*:\s*([^;}]+)[;}]/i);
      if (!srcMatch) return null;
      const url = extractFontUrl(srcMatch[1]);
      if (!url) return null;
      try {
        return { cssText, url: new URL(url, document.baseURI).href };
      } catch (_error) {
        return null;
      }
    });

    const dataUris = await Promise.all(
      resolved.map((entry) => (entry ? fetchAsDataUri(entry.url) : Promise.resolve(null))),
    );

    const inlined = [];
    let totalBytes = 0;
    for (let index = 0; index < resolved.length; index += 1) {
      const entry = resolved[index];
      const dataUri = dataUris[index];
      if (!entry || !dataUri) continue;
      const approxBytes = dataUri.length * 0.75;
      if (totalBytes + approxBytes > MAX_TOTAL_FONT_BYTES) break;
      totalBytes += approxBytes;
      inlined.push(entry.cssText.replace(SRC_DECLARATION_RE, `src: url("${dataUri}")`));
    }
    return inlined.length > 0 ? inlined.join("\n") : null;

  function stripExternal(clone) {
    const images = clone.querySelectorAll("img");
    for (let index = 0; index < images.length; index += 1) {
      const src = images[index].getAttribute("src");

    const scrollY = window.scrollY;

    const height = window.innerHeight;

      postToTrustedTop({
        type: "INLINE_EDIT_SCREENSHOT_RESULT",
        requestId,
        dataUrl,

      const inlinedFontCss = await buildInlinedFontCss();

        '<foreignObject width="100%" height="100%">' +
        `<div xmlns="http://www.w3.org/1999/xhtml" style="width:${width}px;height:${height}px;overflow:hidden">` +

    if (event.source !== window.parent) return;

    const trustedParentOrigin = getTrustedParentOrigin(event);
    if (!trustedParentOrigin) return;
    trustedTopOrigin = trustedParentOrigin;

    if (event.data.type === "INLINE_EDIT_SCROLL_START") {
      scrollForwarding = true;
      emitScroll();
      return;
    }

    if (event.data.type === "INLINE_EDIT_SCROLL_STOP") {
      scrollForwarding = false;
      if (scrollRaf) cancelAnimationFrame(scrollRaf);
      scrollRaf = 0;
      return;
    }

    if (event.data.type !== "INLINE_EDIT_CAPTURE_REQUEST") return;

    handleCaptureRequest(event);
  });
})();
